<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAGeo Team Texting</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh;}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:#fff;border-radius:16px;border:0.5px solid #ddd;padding:2rem;width:340px;max-width:90vw;text-align:center;}
.login-logo{font-size:22px;font-weight:600;margin-bottom:4px;}.login-logo span{color:#2563eb;}
.login-sub{font-size:13px;color:#888;margin-bottom:2rem;}
.pin-input{width:100%;padding:10px 14px;border:0.5px solid #ddd;border-radius:8px;font-size:16px;text-align:center;letter-spacing:6px;background:#f9f9f7;margin-bottom:1rem;box-sizing:border-box;}
.pin-input:focus{outline:none;border-color:#2563eb;}
.login-btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;}
.login-btn:hover{background:#1d4ed8;}
.login-error{font-size:12px;color:#dc2626;margin-top:8px;}
#app{display:none;}
.topbar{background:#fff;border-bottom:0.5px solid #e5e5e5;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:15px;font-weight:600;flex:1;}.topbar-logo span{color:#2563eb;}
.topbar-user{font-size:12px;color:#888;}.topbar-user strong{color:#1a1a1a;}
.logout-btn{font-size:12px;padding:4px 10px;border:0.5px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#888;}
.main{max-width:1100px;margin:0 auto;padding:1.5rem;}
.view-toggle{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.vbtn{padding:6px 14px;font-size:13px;border-radius:8px;border:0.5px solid #ddd;background:#fff;color:#888;cursor:pointer;}
.vbtn.active{background:#f4f4f0;color:#1a1a1a;font-weight:500;border-color:#bbb;}
.empty{padding:2.5rem;text-align:center;color:#aaa;font-size:13px;}
/* Team view */
.staff-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.staff-row{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;padding:14px 16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
.staff-input{font-size:13px;padding:6px 10px;border:0.5px solid #ddd;border-radius:7px;font-family:inherit;background:#f9f9f7;}
.staff-name-input{flex:1;min-width:140px;}
.staff-phone-input{width:150px;}
.staff-actions{display:flex;gap:6px;flex-shrink:0;margin-left:auto;}
.btn-test{font-size:11px;padding:4px 10px;border:0.5px solid #888;border-radius:6px;background:#fff;color:#555;cursor:pointer;font-family:inherit;}
.btn-del{font-size:11px;padding:4px 10px;border:0.5px solid #fca5a5;border-radius:6px;background:#fff;color:#dc2626;cursor:pointer;font-family:inherit;}
.add-staff-btn{width:100%;padding:10px;background:#fff;border:0.5px dashed #ccc;border-radius:12px;color:#888;cursor:pointer;font-size:13px;font-family:inherit;}
.add-staff-btn:hover{background:#f4f4f0;color:#1a1a1a;}
.section-label{font-size:12px;font-weight:600;color:#888;margin:1.75rem 0 0.6rem;text-transform:uppercase;letter-spacing:0.03em;}
.group-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.group-row{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;padding:14px 16px;}
.group-row-top{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.group-name-input{flex:1;}
.group-members{display:flex;flex-wrap:wrap;gap:6px;}
.group-member-chip{font-size:12px;padding:4px 10px;border:0.5px solid #ddd;border-radius:20px;background:#f9f9f7;cursor:pointer;display:inline-flex;align-items:center;gap:5px;color:#555;font-family:inherit;}
.group-member-chip input{margin:0;}
.group-member-chip.checked{background:#eff6ff;border-color:#2563eb;color:#2563eb;}
.group-members-empty{font-size:12px;color:#aaa;}
.msg-roster-label{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.03em;padding:4px 4px 0;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
/* Messages */
.msg-layout{display:flex;gap:16px;align-items:flex-start;}
.msg-roster{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.msg-roster-item{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;}
.msg-roster-item:hover{background:#fafaf8;}
.msg-roster-item.active{border-color:#2563eb;background:#eff6ff;color:#2563eb;font-weight:500;}
.msg-roster-phone{font-size:11px;color:#888;margin-top:1px;}
.msg-roster-item.active .msg-roster-phone{color:#93c5fd;}
.msg-thread-wrap{flex:1;display:flex;flex-direction:column;background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;overflow:hidden;min-height:520px;}
.msg-thread-hd{padding:12px 16px;border-bottom:0.5px solid #f0f0f0;font-size:13px;font-weight:600;}
.msg-thread{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;max-height:520px;}
.msg-row{display:flex;flex-direction:column;max-width:78%;}
.msg-row.out{align-self:flex-end;align-items:flex-end;}
.msg-row.in{align-self:flex-start;align-items:flex-start;}
.msg-sender{font-size:11px;font-weight:700;margin-bottom:3px;padding:0 4px;}
.msg-row.out .msg-sender{color:#2563eb;}
.msg-row.in .msg-sender{color:#555;}
.msg-bubble{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.4;word-break:break-word;}
.msg-row.out .msg-bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px;}
.msg-row.in .msg-bubble{background:#f4f4f0;color:#1a1a1a;border-bottom-left-radius:4px;}
.msg-row.failed .msg-bubble{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.msg-meta{font-size:10px;color:#aaa;margin-top:3px;padding:0 4px;}
.msg-photo{max-width:220px;border-radius:10px;margin-top:6px;display:block;}
.msg-compose{border-top:0.5px solid #f0f0f0;padding:12px 16px;display:flex;gap:8px;align-items:flex-end;}
.msg-compose textarea{flex:1;resize:none;font-family:inherit;font-size:13px;padding:8px 10px;border:0.5px solid #ddd;border-radius:8px;min-height:38px;max-height:100px;}
.msg-compose textarea:focus{outline:none;border-color:#2563eb;}
.msg-photo-btn{font-size:16px;background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:8px 10px;cursor:pointer;flex-shrink:0;}
.msg-photo-btn:hover{background:#f4f4f0;}
.msg-send-btn{font-size:13px;padding:8px 16px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer;font-family:inherit;font-weight:500;flex-shrink:0;}
.msg-send-btn:hover{background:#1d4ed8;}
.msg-send-btn:disabled{opacity:0.5;cursor:default;}
.msg-photo-preview{display:none;align-items:center;gap:8px;font-size:11px;color:#555;padding:0 16px 8px;}
.msg-photo-preview.show{display:flex;}
.msg-photo-preview img{height:40px;border-radius:6px;}
.msg-photo-remove{font-size:11px;padding:2px 8px;border:0.5px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#dc2626;}
@media(max-width:700px){
  .main{padding:1rem 0.75rem;}
  .msg-layout{flex-direction:column;}
  .msg-roster{width:100%;flex-direction:row;overflow-x:auto;}
  .msg-roster-item{flex-shrink:0;white-space:nowrap;}
  .msg-thread-wrap{min-height:420px;}
  .msg-thread{max-height:420px;}
}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">NAGeo <span>Team Texting</span></div>
    <div class="login-sub">Enter your PIN to continue</div>
    <input type="password" class="pin-input" id="pin-input" placeholder="PIN" maxlength="6" inputmode="numeric">
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">NAGeo <span>Team Texting</span></div>
    <div class="topbar-user">Signed in as <strong id="topbar-name"></strong></div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>
  <div class="main">
    <div class="view-toggle">
      <button class="vbtn active" id="btn-messages" onclick="setView('messages')">&#128172; Messages</button>
      <button class="vbtn" id="btn-staff" onclick="setView('staff')">&#128101; Team</button>
    </div>

    <div id="view-messages">
      <div class="msg-layout">
        <div class="msg-roster" id="msg-roster-list"></div>
        <div class="msg-thread-wrap">
          <div class="msg-thread-hd" id="msg-thread-hd">Pick someone to text</div>
          <div class="msg-thread" id="msg-thread"><div class="empty">Pick someone from the left to see the conversation.</div></div>
          <div class="msg-photo-preview" id="msg-photo-preview">
            <img id="msg-photo-preview-img" src="" alt="">
            <span>Photo attached</span>
            <button class="msg-photo-remove" onclick="removePendingPhoto()">Remove</button>
          </div>
          <div class="msg-compose">
            <button class="msg-photo-btn" onclick="document.getElementById('msg-photo-input').click()" title="Attach a photo">&#128247;</button>
            <input type="file" id="msg-photo-input" accept="image/*" style="display:none" onchange="onPhotoChosen(this)">
            <textarea id="msg-compose-text" placeholder="Type a message... (you can paste a photo here too)" rows="1" onpaste="handleComposePaste(event)" onkeydown="handleComposeKeydown(event)"></textarea>
            <button class="msg-send-btn" id="msg-send-btn" onclick="sendComposedMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <div id="view-staff" style="display:none">
      <div class="staff-list" id="staff-list"></div>
      <button class="add-staff-btn" onclick="addStaffRow()">+ Add person</button>

      <div class="section-label">Groups</div>
      <div class="group-list" id="group-list"></div>
      <button class="add-staff-btn" onclick="addGroupRow()">+ Add group</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SUPABASE_URL = 'https://hpgwwegjsxyxovdattoc.supabase.co';
var SUPABASE_KEY = 'sb_publishable_D2PqYQoJjZ8koEM9NPvmeg_KB_Wa66H';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var EDGE_FN = SUPABASE_URL + '/functions/v1/swift-calls';
var STORAGE_BUCKET = 'call-media';

var currentUser = null, users = [];
var staff = [];
var groups = [];
var currentView = 'messages';

var currentThreadStaff = null;
var currentThreadGroup = null;
var threadMessages = [];
var messagePollTimer = null;
var pendingPhotoFile = null;

async function init() {
  var saved = localStorage.getItem('nageo_calls_user');
  if (saved) { currentUser = JSON.parse(saved); showApp(); }
  else {
    var res = await sb.from('users').select('*').order('name');
    users = res.data || [];
    document.getElementById('login-screen').style.display = 'flex';
  }
}
function doLogin() {
  var pin = document.getElementById('pin-input').value.trim();
  if (!pin) { document.getElementById('login-error').textContent = 'Enter your PIN.'; return; }
  var user = users.find(function(u){ return String(u.pin) === pin; });
  if (!user) { document.getElementById('login-error').textContent = 'PIN not recognized.'; document.getElementById('pin-input').value=''; return; }
  currentUser = user;
  localStorage.setItem('nageo_calls_user', JSON.stringify(user));
  showApp();
}
document.addEventListener('keydown', function(e){
  var ls = document.getElementById('login-screen');
  if (e.key==='Enter' && ls && ls.style.display!=='none') doLogin();
});
function doLogout() {
  currentUser = null;
  localStorage.removeItem('nageo_calls_user');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  if (messagePollTimer) { clearInterval(messagePollTimer); messagePollTimer = null; }
}
function showApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('topbar-name').textContent = currentUser.name;
  loadStaff();
  loadGroups();
  setView('messages');
}
function setView(v) {
  currentView = v;
  document.getElementById('view-messages').style.display = v==='messages' ? 'block' : 'none';
  document.getElementById('view-staff').style.display = v==='staff' ? 'block' : 'none';
  document.getElementById('btn-messages').className = 'vbtn' + (v==='messages'?' active':'');
  document.getElementById('btn-staff').className = 'vbtn' + (v==='staff'?' active':'');
  if (v === 'messages') {
    renderMessagesRoster();
    if (currentThreadStaff && !messagePollTimer) messagePollTimer = setInterval(loadMessages, 8000);
  } else if (messagePollTimer) {
    clearInterval(messagePollTimer);
    messagePollTimer = null;
  }
}
async function callFn(payload) {
  var res = await fetch(EDGE_FN, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},
    body:JSON.stringify(payload)
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function loadStaff() {
  try {
    var data = await callFn({action:'staff_list'});
    staff = data.staff || [];
    renderStaff();
    renderGroups();
    if (currentView === 'messages') renderMessagesRoster();
  } catch(e) { showToast('Error loading team: '+e.message); }
}
async function loadGroups() {
  try {
    var data = await callFn({action:'groups_list'});
    groups = data.groups || [];
    renderGroups();
    if (currentView === 'messages') renderMessagesRoster();
  } catch(e) { showToast('Error loading groups: '+e.message); }
}
/* ── Messages ────────────────────────────────────────────────────── */
// Roster shows saved groups (broadcast lists) above individual people —
// picking a group opens a compose-and-broadcast view instead of a live
// two-way thread, since replies to a group text aren't really "to the
// group" over plain SMS (see openGroupThread).
function renderMessagesRoster() {
  var el = document.getElementById('msg-roster-list');
  var activeStaff = staff.filter(function(s){ return s.active !== false && s.id; });
  var activeGroups = groups.filter(function(g){ return g.active !== false && g.id; });
  if (!activeStaff.length && !activeGroups.length) { el.innerHTML = '<div class="empty">Add people under Team first.</div>'; return; }
  var html = '';
  if (activeGroups.length) {
    html += '<div class="msg-roster-label">Groups</div>';
    html += activeGroups.map(function(g){
      var isActive = g.id === currentThreadGroup;
      var count = (g.member_ids||[]).length;
      return '<div class="msg-roster-item'+(isActive?' active':'')+'" onclick="openGroupThread(\''+g.id+'\')">&#128101; '
        + esc(g.name) + '<div class="msg-roster-phone">'+count+' '+(count===1?'person':'people')+'</div></div>';
    }).join('');
  }
  if (activeStaff.length) {
    if (activeGroups.length) html += '<div class="msg-roster-label">People</div>';
    html += activeStaff.map(function(s){
      var isActive = s.id === currentThreadStaff;
      return '<div class="msg-roster-item'+(isActive?' active':'')+'" onclick="openThread(\''+s.id+'\')">'
        + esc(s.name) + '<div class="msg-roster-phone">'+esc(s.phone)+'</div></div>';
    }).join('');
  }
  el.innerHTML = html;
}
function openThread(staffId) {
  currentThreadStaff = staffId;
  currentThreadGroup = null;
  var s = staff.find(function(x){ return x.id===staffId; });
  document.getElementById('msg-thread-hd').textContent = s ? 'Texting ' + s.name : 'Conversation';
  renderMessagesRoster();
  loadMessages();
  if (messagePollTimer) clearInterval(messagePollTimer);
  messagePollTimer = setInterval(loadMessages, 8000);
}
// A group "thread" is really a broadcast log: what you've sent to this list
// and how many of them it reached. Replies always land in each person's own
// 1:1 thread (tagged with which group the text came from), not here — SMS
// has no real "everyone sees everyone's replies" group mode when messages
// go out as separate texts from a business number.
function openGroupThread(groupId) {
  currentThreadGroup = groupId;
  currentThreadStaff = null;
  var g = groups.find(function(x){ return x.id===groupId; });
  var count = g ? (g.member_ids||[]).length : 0;
  document.getElementById('msg-thread-hd').textContent = g ? 'Texting group: ' + g.name + ' (' + count + (count===1?' person':' people') + ')' : 'Group';
  renderMessagesRoster();
  loadMessages();
  if (messagePollTimer) clearInterval(messagePollTimer);
  messagePollTimer = setInterval(loadMessages, 8000);
}
async function loadMessages() {
  if (!currentThreadStaff && !currentThreadGroup) return;
  try {
    var payload = currentThreadGroup
      ? {action:'messages_list', group_id:currentThreadGroup}
      : {action:'messages_list', staff_id:currentThreadStaff};
    var data = await callFn(payload);
    threadMessages = data.messages || [];
    renderThread();
  } catch(e) { showToast('Error loading messages: '+e.message); }
}
function renderThread() {
  var el = document.getElementById('msg-thread');
  if (!threadMessages.length) { el.innerHTML = '<div class="empty">No messages yet — say hi.</div>'; return; }
  var wasNearBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 60;
  el.innerHTML = threadMessages.map(function(m){
    var isOut = m.direction === 'outbound';
    var isGroupMsg = !!m.group_id;
    // When a group broadcast shows up inside one person's own 1:1 thread,
    // tag it with which group it went out as, and report THIS person's own
    // delivery result rather than the whole broadcast's (the group's own
    // thread view shows the aggregate instead).
    var inPersonThread = isGroupMsg && !!currentThreadStaff;
    var mine = null;
    if (inPersonThread && Array.isArray(m.recipients)) {
      mine = m.recipients.find(function(r){ return String(r.staff_id) === String(currentThreadStaff); });
    }
    var rowFailed = mine ? mine.status !== 'sent' : m.status === 'failed';
    var time = new Date(m.created_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
    var senderLabel = isOut ? (m.sent_by || 'Someone') : (m.staff_id ? nameForStaff(m.staff_id) : (m.from_phone || 'Reply'));
    var html = '<div class="msg-row '+(isOut?'out':'in')+(rowFailed?' failed':'')+'">';
    html += '<div class="msg-sender">'+esc(senderLabel)+(isOut?' (you)':'')+(inPersonThread?' &rarr; '+esc(nameForGroup(m.group_id)):'')+'</div>';
    html += '<div class="msg-bubble">';
    if (m.body) html += esc(m.body);
    (m.media_urls||[]).forEach(function(u){ html += '<img class="msg-photo" src="'+esc(u)+'" alt="photo">'; });
    html += '</div>';
    var metaBits = [];
    if (mine) {
      metaBits.push(mine.status === 'sent' ? 'Delivered' : 'Failed: ' + esc(mine.error || 'unknown error'));
    } else if (isGroupMsg && Array.isArray(m.recipients) && m.recipients.length) {
      var okCount = m.recipients.filter(function(r){ return r.status === 'sent'; }).length;
      metaBits.push(okCount + '/' + m.recipients.length + ' delivered');
    } else if (m.status === 'failed') {
      metaBits.push('Failed: ' + esc(m.error || 'unknown error'));
    }
    metaBits.push(time);
    html += '<div class="msg-meta">'+metaBits.join(' &middot; ')+'</div>';
    html += '</div>';
    return html;
  }).join('');
  if (wasNearBottom) el.scrollTop = el.scrollHeight;
}
function nameForStaff(id) {
  var s = staff.find(function(x){ return x.id===id; });
  return s ? s.name : 'Them';
}
function nameForGroup(id) {
  var g = groups.find(function(x){ return x.id===id; });
  return g ? g.name : 'Group';
}
function onPhotoChosen(input) {
  if (!input.files || !input.files[0]) return;
  setPendingPhoto(input.files[0]);
}
// Shared by both the file picker and clipboard paste, so a pasted screenshot
// gets the exact same preview + upload treatment as a chosen file.
function setPendingPhoto(file) {
  pendingPhotoFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('msg-photo-preview-img').src = e.target.result;
    document.getElementById('msg-photo-preview').classList.add('show');
  };
  reader.readAsDataURL(pendingPhotoFile);
}
// Pasted images from the clipboard (screenshots, copied photos) come through
// as a clipboard item with no reliable filename, so this goes straight into
// pendingPhotoFile rather than the file input.
function handleComposePaste(e) {
  var cd = e.clipboardData || window.clipboardData;
  if (!cd || !cd.items) return;
  for (var i = 0; i < cd.items.length; i++) {
    var item = cd.items[i];
    if (item.type && item.type.indexOf('image') !== -1) {
      var file = item.getAsFile();
      if (file) {
        e.preventDefault();
        setPendingPhoto(file);
        showToast('Photo pasted — ready to send.');
      }
      break;
    }
  }
}
function handleComposeKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendComposedMessage();
  }
}
function removePendingPhoto() {
  pendingPhotoFile = null;
  document.getElementById('msg-photo-input').value = '';
  document.getElementById('msg-photo-preview').classList.remove('show');
}
// ClickSend caps MMS attachments at 250 kB — a full-res phone photo or
// screenshot is almost always way over that and comes back as a generic
// "Invalid input" error with no obvious cause. Shrink + re-encode as JPEG
// client-side before upload so sends actually go through. Animated GIFs are
// left alone (resizing would break the animation) — if a big GIF ever fails,
// that's a real "too big" case, not this bug.
function compressImageForMms(file) {
  return new Promise(function(resolve, reject) {
    if (file.type === 'image/gif') { resolve(file); return; }
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(url);
      var maxDim = 1400;
      var quality = 0.85;
      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');
      var TARGET_BYTES = 230 * 1024; // stay under ClickSend's 250 kB cap
      function attempt() {
        var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(function(blob) {
          if (!blob) { reject(new Error('Could not process image')); return; }
          var atFloor = maxDim <= 500 && quality <= 0.4;
          if (blob.size <= TARGET_BYTES || atFloor) { resolve(blob); return; }
          if (quality > 0.4) quality -= 0.15; else maxDim = Math.round(maxDim * 0.75);
          attempt();
        }, 'image/jpeg', quality);
      }
      attempt();
    };
    img.onerror = function() { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
    img.src = url;
  });
}
async function sendComposedMessage() {
  if (!currentThreadStaff && !currentThreadGroup) { showToast('Pick someone or a group to text first.'); return; }
  var textEl = document.getElementById('msg-compose-text');
  var text = textEl.value.trim();
  if (!text && !pendingPhotoFile) { showToast('Type a message or attach a photo.'); return; }
  var btn = document.getElementById('msg-send-btn');
  btn.disabled = true;
  var mediaUrls = [];
  try {
    if (pendingPhotoFile) {
      var toUpload = await compressImageForMms(pendingPhotoFile);
      var isGif = (toUpload.type || pendingPhotoFile.type) === 'image/gif';
      var safeName = 'photo_' + Date.now() + '.' + (isGif ? 'gif' : 'jpg');
      var folder = currentThreadGroup ? 'group_' + currentThreadGroup : currentThreadStaff;
      var path = folder + '/' + Date.now() + '_' + safeName;
      var up = await sb.storage.from(STORAGE_BUCKET).upload(path, toUpload, { contentType: toUpload.type || 'image/jpeg' });
      if (up.error) throw new Error('Photo upload failed: ' + up.error.message);
      var pub = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      mediaUrls.push(pub.data.publicUrl);
    }
    var payload = currentThreadGroup
      ? {action:'send_group_message', group_id:currentThreadGroup, body:text, media_urls:mediaUrls, sent_by:currentUser.name}
      : {action:'send_message', staff_id:currentThreadStaff, body:text, media_urls:mediaUrls, sent_by:currentUser.name};
    var data = await callFn(payload);
    textEl.value = '';
    removePendingPhoto();
    await loadMessages();
    if (data.warning) showToast(data.warning);
    else if (!data.ok) showToast('Send failed — check ClickSend status and account credit.');
  } catch(e) { showToast('Error: '+e.message); }
  btn.disabled = false;
}
/* ── Team ────────────────────────────────────────────────────────── */
function renderStaff() {
  var el = document.getElementById('staff-list');
  if (!staff.length) { el.innerHTML = '<div class="empty">No one added yet. Add people below.</div>'; return; }
  el.innerHTML = staff.map(renderStaffRow).join('');
}
// Every staff row gets a stable client-side _key (independent of the DB id,
// which doesn't exist yet for a brand-new unsaved row). All DOM handlers key
// off _key so "new row" lookups never depend on coercing null through a
// string-built onclick attribute.
var staffKeySeq = 0;
function ensureKey(s) { if (!s._key) s._key = 'k' + (++staffKeySeq); return s._key; }
function renderStaffRow(s) {
  var key = ensureKey(s);
  var html = '<div class="staff-row" data-key="'+key+'">';
  html += '<input class="staff-input staff-name-input" placeholder="Name" value="'+esc(s.name||'')+'" onchange="updateStaffField(\''+key+'\',\'name\',this.value)">';
  html += '<input class="staff-input staff-phone-input" placeholder="+1 555 123 4567" value="'+esc(s.phone||'')+'" onchange="updateStaffField(\''+key+'\',\'phone\',this.value)">';
  html += '<div class="staff-actions">';
  html += '<button class="btn-test" onclick="testAlert(\''+key+'\')">Test text</button>';
  html += '<button class="btn-del" onclick="deleteStaff(\''+key+'\')">Remove</button>';
  html += '</div></div>';
  return html;
}
function addStaffRow() {
  staff.push({id:null, name:'', phone:'', active:true, _new:true});
  renderStaff();
}
async function saveStaffRow(s) {
  try {
    var data = await callFn({action:'staff_save', staff:s});
    var key = s._key;
    Object.assign(s, data.staff);
    s._key = key; // keep the same client key across the id being filled in
    delete s._new;
    renderStaff();
    renderGroups(); // group member chips show staff names, keep them in sync
    if (currentView === 'messages') renderMessagesRoster();
  } catch(e) { showToast('Error saving: '+e.message); }
}
function updateStaffField(key, field, value) {
  var s = staff.find(function(x){ return x._key===key; });
  if (!s) return;
  s[field] = value;
  if (s.name && s.phone) saveStaffRow(s);
}
async function deleteStaff(key) {
  var s = staff.find(function(x){ return x._key===key; });
  if (!s) return;
  if (!s.id) { staff = staff.filter(function(x){ return x._key!==key; }); renderStaff(); return; }
  if (!confirm('Remove '+(s.name||'this person')+'? Their message history stays, but they won’t show up to text anymore.')) return;
  try {
    await callFn({action:'staff_delete', id:s.id});
    staff = staff.filter(function(x){ return x._key!==key; });
    renderStaff();
    renderGroups();
    if (currentThreadStaff === s.id) { currentThreadStaff = null; document.getElementById('msg-thread-hd').textContent = 'Pick someone to text'; }
    if (currentView === 'messages') renderMessagesRoster();
    showToast('Removed.');
  } catch(e) { showToast('Error: '+e.message); }
}
async function testAlert(key) {
  var s = staff.find(function(x){ return x._key===key; });
  if (!s || !s.phone) { showToast('Add a phone number first.'); return; }
  try {
    await callFn({action:'test_sms', phone:s.phone, message:'Test text from NAGeo Team Texting — routing to '+s.name+' works.'});
    showToast('Test text sent to '+s.name+'.');
  } catch(e) { showToast('Error: '+e.message); }
}
/* ── Groups ──────────────────────────────────────────────────────── */
// Same stable client-side _key pattern as staff rows (see ensureKey above) —
// a brand-new unsaved group has id:null, so all DOM handlers key off _key
// instead of the real id.
var groupKeySeq = 0;
function ensureGroupKey(g) { if (!g._key) g._key = 'gk' + (++groupKeySeq); return g._key; }
function renderGroups() {
  var el = document.getElementById('group-list');
  if (!el) return; // Team tab not on screen yet — nothing to render into
  if (!groups.length) { el.innerHTML = '<div class="empty">No groups yet. Add one to text several people at once.</div>'; return; }
  el.innerHTML = groups.map(renderGroupRow).join('');
}
function renderGroupRow(g) {
  var key = ensureGroupKey(g);
  var memberIds = (g.member_ids||[]).map(String);
  var activeStaff = staff.filter(function(s){ return s.id; });
  var html = '<div class="group-row" data-key="'+key+'">';
  html += '<div class="group-row-top">';
  html += '<input class="staff-input group-name-input" placeholder="Group name (e.g. All Techs)" value="'+esc(g.name||'')+'" onchange="updateGroupField(\''+key+'\',\'name\',this.value)">';
  html += '<button class="btn-del" onclick="deleteGroup(\''+key+'\')">Remove</button>';
  html += '</div>';
  html += '<div class="group-members">';
  if (!activeStaff.length) {
    html += '<span class="group-members-empty">Add people above first.</span>';
  } else {
    html += activeStaff.map(function(s){
      var checked = memberIds.indexOf(String(s.id)) !== -1;
      return '<label class="group-member-chip'+(checked?' checked':'')+'"><input type="checkbox" '+(checked?'checked':'')+' onchange="toggleGroupMember(\''+key+'\',\''+s.id+'\',this.checked)">'+esc(s.name)+'</label>';
    }).join('');
  }
  html += '</div></div>';
  return html;
}
function addGroupRow() {
  groups.push({id:null, name:'', member_ids:[], active:true, _new:true});
  renderGroups();
}
async function saveGroupRow(g) {
  try {
    var data = await callFn({action:'group_save', group:g});
    var key = g._key;
    Object.assign(g, data.group);
    g._key = key;
    delete g._new;
    renderGroups();
    if (currentView === 'messages') renderMessagesRoster();
  } catch(e) { showToast('Error saving group: '+e.message); }
}
function updateGroupField(key, field, value) {
  var g = groups.find(function(x){ return x._key===key; });
  if (!g) return;
  g[field] = value;
  if (g.name) saveGroupRow(g);
}
// A brand-new group with no name yet can still have members checked — those
// stay in local state until a name is typed, at which point the first save
// carries the already-selected members along with it.
function toggleGroupMember(key, staffId, checked) {
  var g = groups.find(function(x){ return x._key===key; });
  if (!g) return;
  var ids = (g.member_ids||[]).map(String);
  if (checked) { if (ids.indexOf(staffId)===-1) ids.push(staffId); }
  else { ids = ids.filter(function(id){ return id!==staffId; }); }
  g.member_ids = ids;
  if (g.name) saveGroupRow(g); else renderGroups();
}
async function deleteGroup(key) {
  var g = groups.find(function(x){ return x._key===key; });
  if (!g) return;
  if (!g.id) { groups = groups.filter(function(x){ return x._key!==key; }); renderGroups(); return; }
  if (!confirm('Remove group "'+(g.name||'this group')+'"? Past broadcasts stay in history.')) return;
  try {
    await callFn({action:'group_delete', id:g.id});
    groups = groups.filter(function(x){ return x._key!==key; });
    renderGroups();
    if (currentThreadGroup === g.id) { currentThreadGroup = null; document.getElementById('msg-thread-hd').textContent = 'Pick someone to text'; }
    if (currentView === 'messages') renderMessagesRoster();
    showToast('Group removed.');
  } catch(e) { showToast('Error: '+e.message); }
}
/* ── Helpers ─────────────────────────────────────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },4500); }
init();
</script>
